<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me ❤️</title>

    <style>
       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ffdbe8;
    overflow:hidden;
}

.screen{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#animation,
#result{
    display:none;
}

.bear{
    width:220px;
    border-radius:15px;
    margin-bottom:20px;
}

h1{
    color:#444;
    font-size:42px;
    margin-bottom:25px;
    text-align:center;
}

.btns{
    display:flex;
    gap:20px;
    position:relative;
}

button{
    border:none;
    border-radius:40px;
    padding:14px 35px;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
}

#yes{
    background:#ff5d8f;
    color:white;
    z-index:1;
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:#ff3b61;
    color:white;
    position:fixed;
    left:58%;
    top:62%;
    z-index:9999;
}

/* Animation Screen */

#animation{
    background:#ffdbe8;
}

#bigHeart{
    font-size:40px;
    opacity:0;
}

.showHeart{
    animation:heartGrow 2s forwards;
}

@keyframes heartGrow{

0%{
transform:scale(0);
opacity:0;
}

20%{
opacity:1;
transform:scale(1);
}

50%{
transform:scale(2);
}

100%{
transform:scale(5);
opacity:0;
}

}

/* Balloons */

#balloons{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.balloon{
    position:absolute;
    bottom:-100px;
    font-size:42px;
    animation:flyUp linear forwards;
}

@keyframes flyUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Fireworks */

#fireworks{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* Result */

#result{
    animation:zoom .7s ease;
}

@keyframes zoom{

0%{
transform:scale(.3);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

@media(max-width:600px){

.bear{
width:180px;
}

h1{
font-size:30px;
}

button{
font-size:18px;
padding:12px 28px;
}

} 
    </style>
</head>
<body>

<!-- Question Screen -->
<div id="question" class="screen">

    <video class="bear" autoplay muted loop playsinline>
        <source src="bear1.mp4" type="video/mp4">
    </video>

    <h1>Do You Love Me? ❤️</h1>

    <div class="btns">
        <button id="yes">Yes ❤️</button>
        <button id="no">No 💔</button>
    </div>

</div>

<!-- Animation Screen -->

<div id="animation" class="screen">

    <div id="bigHeart">❤️</div>

    <div id="balloons"></div>

    <canvas id="fireworks"></canvas>

</div>

<!-- Result Screen -->

<div id="result" class="screen">

    <video class="bear" autoplay muted loop playsinline>
        <source src="bear2.mp4" type="video/mp4">
    </video>

    <h1>I Knew It Nehuu! 😍❤️</h1>

</div>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");

const question = document.getElementById("question");
const animation = document.getElementById("animation");
const result = document.getElementById("result");

const bigHeart = document.getElementById("bigHeart");
const balloons = document.getElementById("balloons");

// ----------------------
// No Button Move (Mobile + Desktop)
// ----------------------

function moveButton(e){

    if(e){
        e.preventDefault();
        e.stopPropagation();
    }

    const margin = 20;

    const maxX = window.innerWidth - no.offsetWidth - margin;
    const maxY = window.innerHeight - no.offsetHeight - margin;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    no.style.left = x + "px";
    no.style.top = y + "px";
}

// Desktop
no.addEventListener("mouseenter", moveButton);

// Mobile
no.addEventListener("touchstart", function(e){
    moveButton(e);
}, {passive:false});

// Safety
no.addEventListener("click", function(e){
    e.preventDefault();
    e.stopPropagation();
    moveButton();
});

// ----------------------
// Balloons
// ----------------------

function createBalloons(){

    balloons.innerHTML="";

    const emoji=["🎈","🎈","💖","💕","❤️","💝"];

    for(let i=0;i<35;i++){

        let b=document.createElement("div");

        b.className="balloon";

        b.innerHTML=emoji[Math.floor(Math.random()*emoji.length)];

        b.style.left=Math.random()*100+"%";

        b.style.animationDuration=(3+Math.random()*2)+"s";

        balloons.appendChild(b);

    }

}

// ----------------------
// Fireworks
// ----------------------

function fireworks(){

    const canvas=document.getElementById("fireworks");
    const ctx=canvas.getContext("2d");

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    let particles=[];

    for(let i=0;i<180;i++){

        particles.push({

            x:canvas.width/2,
            y:canvas.height/2,

            dx:(Math.random()-0.5)*14,
            dy:(Math.random()-0.5)*14,

            size:Math.random()*4+2

        });

    }

    let timer=setInterval(()=>{

        ctx.clearRect(0,0,canvas.width,canvas.height);

        particles.forEach(p=>{

            ctx.beginPath();

            ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

            ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;

            ctx.fill();

            p.x+=p.dx;
            p.y+=p.dy;

        });

    },30);

    setTimeout(()=>{

        clearInterval(timer);

        ctx.clearRect(0,0,canvas.width,canvas.height);

    },2200);

}

// ----------------------
// YES
// ----------------------

yes.addEventListener("click",function(){

    question.style.display="none";

    animation.style.display="flex";

    bigHeart.classList.add("showHeart");

    createBalloons();

    fireworks();

    setTimeout(()=>{

        animation.style.display="none";

        result.style.display="flex";

    },3500);

});
</script>

</body>
</html>
